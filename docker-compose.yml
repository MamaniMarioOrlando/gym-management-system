version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gym_postgres
    environment:
      POSTGRES_USER: gym_admin
      POSTGRES_PASSWORD: gym_password123
      POSTGRES_DB: gym_access_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
